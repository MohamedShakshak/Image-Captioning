seed: 42

data:
  coco_root: /kaggle/input/coco-2017
  annotation_train: /kaggle/input/coco-2017/annotations/captions_train2017.json
  annotation_val: /kaggle/input/coco-2017/annotations/captions_val2017.json
  features_dir: /kaggle/input/coco-features
  vocab_path: vocab.json
  image_size: 224
  resize: 256

model:
  hidden_dim: 512
  embedding_dim: 512
  dropout: 0.5
  vocab_min_freq: 5

train:
  batch_size: 32
  epochs: 20
  lr: 4.0e-4
  weight_decay: 1.0e-5
  label_smoothing: 0.1
  grad_clip: 1.0
  num_workers: 2
  pin_memory: true
  amp: false

optim:
  scheduler: reduce_on_plateau
  factor: 0.5
  patience: 2

eval:
  beam_size: 3
  length_norm_alpha: 0.7
  batch_size: 16
  full_metrics: false

checkpoint:
  dir: /kaggle/working/checkpoints
  save_latest: true
  save_best: true

hf:
  repo: MohamedShakshak/image-captioning-pytorch
  token_env: HF_TOKEN

misc:
  log_every: 50